<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachy Echo, Inc. | v1.2</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #contact-section { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { color: #ff8c69; margin: 0 0 10px 0; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; box-sizing: border-box; }
        #submit-btn { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #submit-btn:hover { background: #2ea043; }
    </style>
</head>
<body>

<section id="contact-section">
    <h2>Peachy Echo, Inc.</h2>
    <p>Version 1.2 — Contact Page Update</p>
    
    <form id="contact-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="4" required></textarea>
        </div>
        <button type="submit" id="submit-btn">Send to Leo@peachyecho.com</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
